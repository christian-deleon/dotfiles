# manifest.yaml — universal inventory of every installable item.
# Schema reference: docs/manifest.md
#
# Each top-level key is an item name. The installer reads this file to:
#   1. Discover what items exist (`dot install <name>`, picker, profiles)
#   2. Decide how to install (binary install, stow config, handler function)
#   3. Decide whether it's eligible on the current host (`requires:` predicates)
#
# Items that lack an `install:` block are config-only. Items that lack a
# `config:` block are tool-only. Items with both are bundles — picking them
# installs the binary AND links the config.

1password-cli:
  description: 1Password CLI (op)
  install:
    arch: 1password-cli
    brew: --cask 1password-cli
    script: install-1password-cli.sh
    command: op

alacritty:
  description: GPU-accelerated cross-platform terminal
  install:
    arch: alacritty
    apt: alacritty
    brew: --cask alacritty
  config:
    type: stow
  post_install: [alacritty_theme_shim]

bat:
  description: Cat with syntax highlighting
  install:
    arch: bat
    apt: bat
    brew: bat

blesh:
  description: Bash autosuggestions + syntax highlighting (ble.sh)
  install:
    script: install-blesh.sh
  config:
    type: stow
  requires: [linux]

btop:
  description: System resource monitor
  config:
    type: stow

cargo:
  description: Cargo config — wires sccache as the Rust compiler wrapper
  config:
    type: handler
    handler: install_cargo_config

claude:
  description: Claude Code AI config (agents, skills, commands, rules)
  config:
    type: handler
    handler: install_ai_claude
  post_install: [generate_mcp_configs]

cloc:
