apiVersion: v1
kind: Service
metadata:
  name: checkout
  namespace: checkout
  labels:
    app.kubernetes.io/name: checkout
    app.kubernetes.io/instance: checkout-prod
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: checkout
    app.kubernetes.io/instance: checkout-prod
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  internalTrafficPolicy: Cluster
  ipFamilyPolicy: SingleStack
---
# Headless variant — for StatefulSet or peer-aware clients (per-pod DNS records)
apiVersion: v1
kind: Service
metadata:
  name: checkout-headless
  namespace: checkout
  labels:
    app.kubernetes.io/name: checkout
    app.kubernetes.io/instance: checkout-prod
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: checkout
    app.kubernetes.io/instance: checkout-prod
  ports:
    - name: http
      port: 80
      targetPort: http
---
# External-only LoadBalancer (rare — prefer Ingress unless this is a raw L4 service)
apiVersion: v1
kind: Service
metadata:
  name: checkout-lb
  namespace: checkout
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/name: checkout
    app.kubernetes.io/instance: checkout-prod
  ports:
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
