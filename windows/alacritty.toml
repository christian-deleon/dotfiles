# Windows-side alacritty config. Auto-launches into WSL Ubuntu-26.04.
# Separate file from the Linux config (alacritty/.config/alacritty/) since the
# Linux one imports an Omarchy theme path that doesn't resolve on Windows.
# Mirror manually if you change fonts/padding/keys.
#
# Theme: Everforest (baked in, sourced from Omarchy ~/.local/share/omarchy/themes/everforest/alacritty.toml).
# To change: replace the [colors.*] sections below with another theme's contents.

[env]
TERM = "xterm-256color"

[terminal]
osc52 = "CopyPaste"

[terminal.shell]
program = "wsl.exe"
args = ["-d", "Ubuntu-26.04", "--cd", "~"]

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
size = 10

[window]
padding.x = 14
padding.y = 14

[keyboard]
bindings = [
{ key = "Insert", mods = "Shift", action = "Paste" },
{ key = "Insert", mods = "Control", action = "Copy" },
{ key = "Return", mods = "Shift", chars = "\r" }
]

[colors.primary]
background = "#2d353b"
foreground = "#d3c6aa"

[colors.cursor]
text = "#2d353b"
cursor = "#d3c6aa"

[colors.vi_mode_cursor]
text = "#2d353b"
cursor = "#d3c6aa"

[colors.search.matches]
foreground = "#2d353b"
background = "#dbbc7f"

[colors.search.focused_match]
foreground = "#2d353b"
background = "#e67e80"

[colors.footer_bar]
foreground = "#2d353b"
background = "#d3c6aa"

[colors.selection]
text = "#2d353b"
background = "#d3c6aa"

[colors.normal]
black = "#475258"
red = "#e67e80"
green = "#a7c080"
yellow = "#dbbc7f"
blue = "#7fbbb3"
magenta = "#d699b6"
cyan = "#83c092"
white = "#d3c6aa"

[colors.bright]
black = "#475258"
red = "#e67e80"
green = "#a7c080"
yellow = "#dbbc7f"
blue = "#7fbbb3"
magenta = "#d699b6"
cyan = "#83c092"
white = "#d3c6aa"
