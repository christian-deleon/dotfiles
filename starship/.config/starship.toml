add_newline = true
command_timeout = 200
format = "$username$hostname[${custom.path}$git_branch$git_status]($style)$python$nodejs$terraform$kubernetes$aws$cmd_duration$jobs$character"

[character]
error_symbol = "[✗](bold cyan)"
success_symbol = "[❯](bold cyan)"

# Path segment. Replaces the built-in [directory] module (kept below for
# reference / easy revert, but no longer referenced in `format`). The helper
# anchors the display on the PROJECT name instead of the worktree's own
# directory, so worktree-per-branch layouts don't repeat the branch name that
# [git_branch] already shows. Layout-agnostic: nested, sibling, and bare-repo
# worktrees all resolve to the project name. See scripts/starship-path.sh.
[custom.path]
description = "Worktree-aware path anchored on the project name"
command = "$HOME/.dotfiles/scripts/starship-path.sh"
when = true
shell = ["bash", "--noprofile", "--norc"]
format = "[$output]($style) "
style = "bold cyan"

# Superseded by [custom.path]; not referenced in `format`. Left for reference.
[directory]
truncation_length = 2
truncation_symbol = "…/"
repo_root_style = "bold cyan"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[$branch]($style) "
style = "italic cyan"

[git_status]
format     = '[$all_status]($style)'
style      = "cyan"
ahead      = "⇡${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
behind     = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked  = "? "
modified   = " "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""

[kubernetes]
disabled = true
format = '[⎈ $context(\($namespace\))]($style) '
style = 'bold blue'

[aws]
disabled = true
format = '[☁ $profile(\($region\))]($style) '
style = 'bold yellow'

[username]
format = '[$user]($style)@'
style_user = 'bold cyan'
style_root = 'bold red'

[hostname]
ssh_only = true
ssh_symbol = ''
format = '[$hostname]($style) '
style = 'bold cyan'

[cmd_duration]
min_time = 10000
format = '[⏱ $duration]($style) '
style = 'bold yellow'

[python]
format = '[🐍 $version]($style) '
style = 'bold yellow'

[nodejs]
disabled = true
format = '[⬢ $version]($style) '
style = 'bold green'

[terraform]
disabled = false
format = '[▲ $workspace]($style) '
style = 'bold purple'

[jobs]
symbol = "✦"
style = "bold blue"
number_threshold = 1
