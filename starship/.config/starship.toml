add_newline = true
command_timeout = 200
format = "$username$hostname[$directory$git_branch$git_status]($style)$python$nodejs$terraform$kubernetes$aws$cmd_duration$character"

[character]
error_symbol = "[✗](bold cyan)"
success_symbol = "[❯](bold cyan)"

[directory]
truncation_length = 2
truncation_symbol = "…/"
repo_root_style = "bold cyan"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[$branch]($style) "
style = "italic cyan"

[git_status]
format     = '[$all_status]($style)'
style      = "cyan"
ahead      = "⇡${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
behind     = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked  = "? "
modified   = " "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""

[kubernetes]
disabled = true
format = '[⎈ $context(\($namespace\))]($style) '
style = 'bold blue'

[aws]
disabled = true
format = '[☁ $profile(\($region\))]($style) '
style = 'bold yellow'

[username]
format = '[$user]($style)@'
style_user = 'bold cyan'
style_root = 'bold red'

[hostname]
ssh_only = true
ssh_symbol = ''
format = '[$hostname]($style) '
style = 'bold cyan'

[cmd_duration]
min_time = 2000
format = '[⏱ $duration]($style) '
style = 'bold yellow'

[python]
format = '[🐍 $version]($style) '
style = 'bold yellow'

[nodejs]
format = '[⬢ $version]($style) '
style = 'bold green'

[terraform]
disabled = false
format = '[▲ $workspace]($style) '
style = 'bold purple'
