# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, K, K9s, exec, omarchy-launch-tui k9s
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password
unbind = SUPER, Slash

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER, M, Proton Mail, exec, omarchy-launch-webapp "https://mail.proton.me/u/0/inbox"
bindd = SUPER SHIFT, T, Todoist, exec, omarchy-launch-webapp "https://app.todoist.com/app/today"
bindd = SUPER SHIFT, A, Claude, exec, omarchy-launch-webapp "https://claude.ai/chat"
bindd = SUPER SHIFT, G, GitLab, exec, omarchy-launch-webapp "https://gitlab.devops.athenis.io/"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, T, Twitch, exec, omarchy-launch-webapp "https://www.twitch.tv/"
bindd = SUPER SHIFT ALT, K, kick, exec, omarchy-launch-webapp "https://www.kick.com/"
bindd = SUPER SHIFT ALT, F, Dropbox, exec, omarchy-launch-webapp "https://www.dropbox.com/home"
bindd = SUPER SHIFT ALT, G, Grafana, exec, omarchy-launch-webapp "https://grafana.athenis.io"
bindd = SUPER SHIFT ALT, H, HomeAssistant, exec, omarchy-launch-webapp "http://homeassistant.local:8123/config/"
bindd = SUPER SHIFT ALT, S, Slack, exec, omarchy-launch-webapp "https://app.slack.com/client/" --profile-directory="Profile 1"

# Copilot key -> push-to-talk dictation
bindd = SUPER SHIFT, code:201, Dictation (start), exec, voxtype record start
bindrd = SUPER SHIFT, code:201, Dictation (stop), exec, voxtype record stop

# Override default SUPER CTRL X toggle with push-to-talk
unbind = SUPER CTRL, X
bindd = SUPER CTRL, X, Dictation (start), exec, voxtype record start
bindrd = SUPER CTRL, X, Dictation (stop), exec, voxtype record stop

# Swap MSI monitor positions (when dock assigns them backwards)
bindd = SUPER CTRL, M, Swap monitors, exec, ~/.config/hypr/monitor-setup.sh --swap

# Lid switch: disable laptop display when closed, re-enable when opened
bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, preferred, auto, 1.33"

# Fix SUPER+J togglesplit (dispatcher removed in Hyprland 0.54, now uses layoutmsg)
unbind = SUPER, J
bindd = SUPER, J, Toggle window split, layoutmsg, togglesplit

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu
