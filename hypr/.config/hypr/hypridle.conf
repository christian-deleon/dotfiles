general {
    # lock-session.sh: lock without immediate blank; blank@5m (battery), suspend@10m battery / @20m AC.
    # Default omarchy: lock_cmd = omarchy-system-lock  (blanks display after 3s)
    lock_cmd = ~/.config/hypr/lock-session.sh
    before_sleep_cmd = OMARCHY_LOCK_ONLY=true omarchy-system-lock    # lock before suspend without scheduling display off.
    after_sleep_cmd = sleep 1 && omarchy-system-wake                 # delay for PAM readiness, then turn on display.
    inhibit_sleep = 3                                      # wait until screen is locked
}

# Start screensaver after 5 minutes
listener {
    timeout = 300
    on-timeout = pidof hyprlock || omarchy-launch-screensaver
}

# Lock system after 10 minutes (screensaver resets idle timer, so have to just do half + 2s margin)
listener {
    timeout = 302
    # Default omarchy: on-timeout = omarchy-system-lock
    on-timeout = ~/.config/hypr/lock-session.sh
    on-resume = omarchy-system-wake
}
