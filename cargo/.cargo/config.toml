[build]
# Cap parallel compiler jobs so a build doesn't saturate all 16 logical CPUs.
# Cargo defaults to one job per core; sccache is a compile *cache* and has no
# effect on parallelism, so this cap is the only thing holding CPU load down.
#
# `jobs` bounds parallel rustc *processes*, not threads: each process still
# spawns codegen-unit threads and mold links with all cores, so on an n-core
# box the build can reach up to n*jobs codegen threads. Hence this is set well
# below the core count rather than at it.
jobs = 4
rustc-wrapper = "sccache"

[target.'cfg(target_os = "linux")']
rustflags = ["-C", "link-arg=-fuse-ld=mold"]
