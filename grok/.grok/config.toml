# Grok Build TUI - User Configuration
# This file is managed by ~/.dotfiles (symlinked into ~/.grok/config.toml)
#
# Grok also reads MCP servers from ~/.claude.json (Claude Code compatibility)
# and project-scoped .grok/config.toml files. Native [mcp_servers] here take precedence.
#
# For skills, agents, and hooks, see the shared ai/ directory in dotfiles.
# They are symlinked into ~/.grok/skills/, ~/.grok/agents/, and ~/.grok/hooks/.

[cli]
auto_update = true

[models]
default = "grok-build"
web_search = "grok-4.20-multi-agent"

[ui]
# Tokyo Night inspired theme (excellent contrast on dark terminals)
theme = "tokyonight"

# Width for reasoning/thinking blocks
max_thoughts_width = 120

# Fork secondary model for parallel exploration (used by some subagents)
fork_secondary_model = "grok-build"

# Permission mode: "ask" | "always-approve" | "never-approve"
# "ask" is the safest default for dotfiles-managed machines
permission_mode = "ask"

# Compact mode reduces prompt padding
compact_mode = false

# YOLO / auto-approve all tool calls (use with extreme caution)
yolo = false

[features]
# Codebase indexing for better project understanding
codebase_indexing = true

# LSP tools (experimental)
lsp_tools = false

# Telemetry and feedback (disabled for privacy)
telemetry = false
feedback = false

[session]
# Auto-compact when context is this full
auto_compact_threshold_percent = 85

# Load .envrc / direnv when present
load_envrc = true

[tools]
# Respect .gitignore for file operations
respect_gitignore = true

# ---------------------------------------------------------------------------
# MCP Servers
# ---------------------------------------------------------------------------
# Primary MCP configuration lives in ~/.dotfiles/ai/mcp-servers.json.tpl
# It is processed by `generate_mcp_configs` and injected into:
#   - ~/.claude.json (for Claude Code + Grok compatibility)
#   - ~/.config/opencode/opencode.json
#
# You can still declare additional [mcp_servers.xxx] here. They will be merged.
# Example:
#
# [mcp_servers.my-internal]
# command = "npx"
# args = ["-y", "@myorg/mcp-server"]
# env = { API_TOKEN = "..." }

# ---------------------------------------------------------------------------
# Disabled MCP Servers (runtime preference)
# ---------------------------------------------------------------------------
# These are servers you don't want enabled globally. You can also toggle
# them at runtime with /mcps or the Ctrl+L plugins modal.
#
# The following are commonly noisy or not needed in most dev environments:
disabled_mcp_servers = [
    "cloudflare-docs",
    "magic",
    "memory",               # enable explicitly with GROK_MEMORY=1 when desired
    "playwright",
    "sequential-thinking",
]

# ---------------------------------------------------------------------------
# Subagents
# ---------------------------------------------------------------------------
[subagents]
enabled = true
default_model = "grok-build"

[subagents.toggle]
explore = true
plan = true

# ---------------------------------------------------------------------------
# Memory (cross-session knowledge)
# ---------------------------------------------------------------------------
# Enable with: grok --experimental-memory  or  export GROK_MEMORY=1
[memory]
enabled = false

[memory.session]
save_on_end = true

[memory.initial_injection]
enabled = true

# ---------------------------------------------------------------------------
# Skills
# ---------------------------------------------------------------------------
# Additional skill directories (beyond ~/.grok/skills/ and ~/.claude/skills/)
# [skills]
# paths = ["~/team-skills"]
# ignore = ["~/team-skills/wip"]

# ---------------------------------------------------------------------------
# Plugins / Marketplace (advanced)
# ---------------------------------------------------------------------------
[plugins]
enabled = []
disabled = []

# Example marketplace source:
# [[marketplace.sources]]
# name = "My Team"
# git = "git@github.com:myorg/grok-plugins.git"
