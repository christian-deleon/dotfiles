[projects."git-codecommit.us-east-1.amazonaws.com/v1/repos/athenis"]
approved-commands = [
    "just platform check",
    "just platform verify",
    "just platform verify && just console check",
    '''
if { git diff --name-only HEAD; git ls-files --others --exclude-standard; } | grep -qE '^(platform/|Cargo\.(toml|lock)$)'; then
  just platform verify
else
  echo "skip platform verify: no rust changes pending"
fi
''',
    """
if { git diff --name-only HEAD; git ls-files --others --exclude-standard; } | grep -qE '^console/'; then
  just console check
else
  echo "skip console check: no console changes pending"
fi
""",
]

[projects."github.com/christian-deleon/athenis"]
approved-commands = [
    "just platform check",
]

[projects."gitlab.devops.athenis.io/platform/athenis"]
approved-commands = [
    "just platform verify",
    "just platform check",
]
