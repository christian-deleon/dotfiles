worktree-path = "../{{ branch | sanitize }}"

[post-create]
tmux = """
P=$(basename "$(dirname "{{ worktree_path }}")")
B={{ branch | sanitize }}
W={{ worktree_path }}
if [ -n "$TMUX" ]; then
    tmux new-window -n "$B" -c "$W"
    tmux set-window-option -t "$B" allow-rename off 2>/dev/null || true
else
    tmux new-session -d -s "$P" -n "$B" -c "$W" -x 220 -y 50 2>/dev/null || true
    tmux set-window-option -t "$P:$B" allow-rename off 2>/dev/null || true
    echo "tmux session '$P' ready — attach with: tmux attach -t $P"
fi
"""

[post-switch]
tmux = """
P=$(basename "$(dirname "{{ worktree_path }}")")
B={{ branch | sanitize }}
W={{ worktree_path }}
if [ -n "$TMUX" ]; then
    if ! tmux list-windows -F "#{window_name}" 2>/dev/null | grep -qx "$B"; then
        tmux new-window -n "$B" -c "$W"
    fi
fi
"""

[pre-remove]
tmux = """
W={{ worktree_path }}
tmux list-windows -a -F "#{session_name}:#{window_index} #{pane_current_path}" 2>/dev/null | \
    awk -v w="$W" '$2 == w {print $1}' | \
    xargs -I{} tmux kill-window -t {} 2>/dev/null || true
"""

[commit.generation]
command = "CLAUDECODE= MAX_THINKING_TOKENS=0 claude -p --model=haiku --tools='' --disable-slash-commands --setting-sources='' --system-prompt=''"
template = """
Generate a git commit message for the following diff using the Conventional Commits format.

Rules:
- Format: <type>(<optional scope>): <description>
- Types: feat, fix, refactor, docs, test, chore, perf, ci
- Description: imperative mood, lowercase, no period, max 72 chars
- Add a body only if the change needs explanation (separate with blank line)
- Output ONLY the commit message, nothing else

Branch: {{ branch }}

Recent commits (for context/style):
{{ recent_commits }}

Diff:
{{ git_diff }}
"""

[list]
summary = true
