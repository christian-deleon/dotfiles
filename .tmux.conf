# Enable mouse mode
set -g mouse on

# Sensible defaults (replaces tmux-sensible plugin)
set -s escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g default-terminal "screen-256color"
set -g focus-events on

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Reload tmux config file
bind r source-file $HOME/.tmux.conf

# Worktrunk popup switcher (prefix + W)
bind-key W display-popup -E -w 60% -h 40% "wt list --format json 2>/dev/null | jq -r '.[] | select(.is_main | not) | .branch' | fzf --prompt='worktree > ' | xargs -I{} tmux send-keys -t \"#{pane_id}\" 'wt switch {}' Enter"

# Kill current window (prefix + X)
bind-key X kill-window

# Kill current session (prefix + Q)
bind-key Q kill-session

# New named session (prefix + N)
bind-key N command-prompt -p "session name:" "new-session -s '%%'"

# Worktrunk status dashboard (prefix + S)
bind-key S display-popup -E -w 80% -h 60% "wt list 2>/dev/null; echo; echo 'Press Enter to close'; read"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '$HOME/.tmux/plugins/tpm/tpm'
